<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Admin — Personal Task Management</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --font:      'DM Sans', system-ui, sans-serif;
      --font-mono: 'DM Mono', monospace;
      --bg:        #F2F3F5;
      --surface:   #FFFFFF;
      --s2:        #F8F9FA;
      --border:    #E5E7EB;
      --border-hi: #D1D5DB;
      --indigo:    #4F46E5;
      --indigo-dk: #4338CA;
      --indigo-bg: #EEF2FF;
      --indigo-ri: #C7D2FE;
      --t1: #111827; --t2: #374151; --t3: #6B7280; --t4: #9CA3AF;

      /* RED — overdue & today */
      --red:    #DC2626; --red-bg: #FEF2F2; --red-bd: #FECACA; --red-tx: #7F1D1D;
      /* YELLOW — soon ≤7d & this-month card */
      --yel:    #CA8A04; --yel-bg: #FEFCE8; --yel-bd: #FEF08A; --yel-tx: #713F12;
      /* PURPLE — upcoming & 90-days card */
      --pur:    #7C3AED; --pur-bg: #F5F3FF; --pur-bd: #DDD6FE; --pur-tx: #3B0764;
      /* GREEN — completed */
      --grn:    #059669; --grn-bg: #ECFDF5; --grn-bd: #A7F3D0; --grn-tx: #064E3B;

      --r-sm: 6px; --r: 10px; --r-lg: 14px; --r-xl: 18px;
      --sh-xs: 0 1px 2px 0 rgb(0 0 0/.04);
      --sh-sm: 0 2px 4px 0 rgb(0 0 0/.06);
      --sh:    0 4px 12px -2px rgb(0 0 0/.08);
      --sh-md: 0 8px 24px -4px rgb(0 0 0/.10);
      --sh-lg: 0 20px 40px -8px rgb(0 0 0/.14);
    }
    html, body, #root { width:100%; height:100%; margin:0; padding:0; }
    body { font-family:var(--font); background:var(--bg); color:var(--t1); -webkit-font-smoothing:antialiased; }

    /* SIDEBAR */
    .sidebar { width:232px; min-width:232px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; height:100vh; position:sticky; top:0; }
    .sb-logo { padding:22px 20px 18px; border-bottom:1px solid var(--border); }
    .sb-logo h1 { font-size:17px; font-weight:700; color:var(--t1); letter-spacing:-.3px; margin:0; }
    .sb-logo p  { font-size:11px; color:var(--t4); margin:4px 0 0; }
    .sb-nav  { padding:10px; flex:1; display:flex; flex-direction:column; gap:1px; }
    .nav-it  { display:flex; align-items:center; gap:9px; padding:9px 11px; border-radius:var(--r-sm); font-size:13px; font-weight:500; color:var(--t3); cursor:pointer; border:none; background:transparent; width:100%; text-align:left; transition:all 140ms; }
    .nav-it:hover  { background:var(--s2); color:var(--t2); }
    .nav-it.active { background:var(--indigo-bg); color:var(--indigo); font-weight:600; }
    .sb-footer { padding:10px; border-top:1px solid var(--border); }

    /* HEADER */
    .page-hd  { background:var(--surface); border-bottom:1px solid var(--border); padding:20px 28px 0; flex-shrink:0; box-shadow:var(--sh-xs); }
    .hd-top   { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:16px; }
    .hd-title { font-size:20px; font-weight:700; color:var(--t1); letter-spacing:-.4px; margin:0; }
    .hd-sub   { font-size:12.5px; color:var(--t3); margin:3px 0 0; }
    .add-btn  { display:flex; align-items:center; gap:6px; padding:9px 18px; background:var(--indigo); border:1px solid var(--indigo-dk); border-radius:var(--r-sm); font-size:13px; font-weight:600; font-family:var(--font); color:#fff; cursor:pointer; transition:all 140ms; box-shadow:var(--sh-xs); white-space:nowrap; }
    .add-btn:hover { background:var(--indigo-dk); transform:translateY(-1px); box-shadow:var(--sh-sm); }

    /* KPI CARDS */
    .kpi-row  { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding-bottom:18px; }
    .kpi-card { border-radius:var(--r); padding:14px 16px; cursor:pointer; border:2px solid transparent; transition:all 170ms cubic-bezier(.4,0,.2,1); position:relative; overflow:hidden; user-select:none; }
    .kpi-card:hover  { transform:translateY(-2px); box-shadow:var(--sh); }
    .kpi-card.active { box-shadow:var(--sh-md); transform:translateY(-2px); }
    .kpi-card.active::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; background:currentColor; opacity:.7; border-radius:0 0 2px 2px; }
    .kpi-lbl  { font-size:10px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; margin-bottom:8px; }
    .kpi-num  { font-size:26px; font-weight:700; line-height:1; letter-spacing:-.5px; }
    .kpi-desc { font-size:11px; margin-top:7px; opacity:.7; }
    .kpi-red    { background:linear-gradient(135deg,var(--red-bg),#FEE2E2); color:var(--red-tx);  border-color:var(--red-bd); }
    .kpi-red.active    { border-color:var(--red); }
    .kpi-yellow { background:linear-gradient(135deg,var(--yel-bg),#FEF9C3); color:var(--yel-tx);  border-color:var(--yel-bd); }
    .kpi-yellow.active { border-color:var(--yel); }
    .kpi-purple { background:linear-gradient(135deg,var(--pur-bg),#EDE9FE); color:var(--pur-tx);  border-color:var(--pur-bd); }
    .kpi-purple.active { border-color:var(--pur); }
    .kpi-green  { background:linear-gradient(135deg,var(--grn-bg),#D1FAE5); color:var(--grn-tx);  border-color:var(--grn-bd); }
    .kpi-green.active  { border-color:var(--grn); }

    /* TOOLBAR */
    .toolbar   { display:flex; align-items:center; gap:8px; padding:12px 28px; background:rgba(242,243,245,.9); backdrop-filter:blur(8px); border-bottom:1px solid var(--border); flex-shrink:0; }
    .search-w  { flex:1; position:relative; min-width:0; }
    .search-w svg { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--t4); pointer-events:none; }
    .search-in { width:100%; padding:8px 12px 8px 36px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); font-size:13px; font-family:var(--font); color:var(--t1); outline:none; transition:border-color 140ms,box-shadow 140ms; }
    .search-in:focus { border-color:var(--indigo); box-shadow:0 0 0 3px rgba(79,70,229,.1); }
    .search-in::placeholder { color:var(--t4); }
    .tb-btn    { display:flex; align-items:center; gap:6px; padding:8px 13px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); font-size:12.5px; font-weight:500; font-family:var(--font); color:var(--t2); cursor:pointer; transition:all 140ms; white-space:nowrap; }
    .tb-btn:hover  { border-color:var(--border-hi); background:var(--s2); }
    .tb-btn.active { background:var(--indigo-bg); border-color:var(--indigo-ri); color:var(--indigo); }

    /* CONTENT */
    .main-scroll { flex:1; overflow-y:auto; min-height:0; }
    .content     { padding:20px 28px 48px; }
    .legend      { display:flex; align-items:center; gap:16px; flex-wrap:wrap; padding:8px 0 14px; }
    .lg-item     { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--t3); font-weight:500; }
    .lg-dot      { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .sec-hd      { font-size:10.5px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--t4); margin:0 0 8px; display:flex; align-items:center; gap:7px; }
    .sec-hd em   { background:var(--border); color:var(--t3); font-size:10px; font-style:normal; padding:1px 7px; border-radius:20px; font-family:var(--font-mono); }
    .sec-block   { margin-bottom:24px; }
    .item-list   { display:flex; flex-direction:column; gap:5px; }

    /* TASK CARD */
    .task-card        { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:13px 14px; display:flex; align-items:flex-start; gap:11px; transition:all 190ms cubic-bezier(.4,0,.2,1); }
    .task-card:hover  { border-color:var(--border-hi); box-shadow:var(--sh); transform:translateY(-1px); }
    .task-card.lc-red    { border-left:3px solid var(--red); }
    .task-card.lc-yellow { border-left:3px solid var(--yel); }
    .task-card.lc-purple { border-left:3px solid var(--pur); }
    .task-card.lc-done   { opacity:.55; }
    .chk-btn  { width:17px; height:17px; min-width:17px; border-radius:4px; border:2px solid var(--border-hi); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 140ms; margin-top:2px; padding:0; }
    .chk-btn:hover:not(.checked) { border-color:var(--grn); }
    .chk-btn.checked { background:var(--grn); border-color:var(--grn); }
    .task-body { flex:1; min-width:0; }
    .task-name { font-size:13.5px; font-weight:600; color:var(--t1); margin:0 0 6px; line-height:1.35; }
    .task-name.done { text-decoration:line-through; color:var(--t4); }
    .meta-row  { display:flex; align-items:center; flex-wrap:wrap; gap:5px; }
    .badge     { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; }
    .badge::before { content:''; width:5px; height:5px; border-radius:50%; background:currentColor; flex-shrink:0; opacity:.75; }
    .b-red    { background:var(--red-bg); color:var(--red); border:1px solid var(--red-bd); }
    .b-yellow { background:var(--yel-bg); color:var(--yel); border:1px solid var(--yel-bd); }
    .b-purple { background:var(--pur-bg); color:var(--pur); border:1px solid var(--pur-bd); }
    .b-green  { background:var(--grn-bg); color:var(--grn); border:1px solid var(--grn-bd); }
    .tag      { background:var(--s2); border:1px solid var(--border); color:var(--t3); font-size:11px; font-weight:500; padding:2px 8px; border-radius:20px; }
    .amt-tag  { font-family:var(--font-mono); font-size:11.5px; font-weight:500; color:var(--t2); background:var(--s2); border:1px solid var(--border); padding:2px 8px; border-radius:20px; }
    .task-info { margin-top:7px; display:flex; align-items:center; gap:12px; font-size:11.5px; color:var(--t4); flex-wrap:wrap; }
    .task-acts { display:flex; gap:1px; opacity:0; transition:opacity 140ms; }
    .task-card:hover .task-acts { opacity:1; }
    .ico-btn   { width:28px; height:28px; border-radius:var(--r-sm); border:none; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--t4); transition:all 140ms; }
    .ico-btn.edit:hover  { background:var(--indigo-bg); color:var(--indigo); }
    .ico-btn.del:hover   { background:var(--red-bg); color:var(--red); }

    /* EMPTY */
    .empty   { text-align:center; padding:56px 20px; color:var(--t4); }
    .empty p { margin:0; font-size:14px; }
    .empty p+p { margin-top:5px; font-size:13px; }

    /* CALENDAR */
    .cal-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); overflow:hidden; box-shadow:var(--sh-xs); }
    .cal-hd   { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); }
    .cal-title { font-size:14px; font-weight:700; color:var(--t1); letter-spacing:-.2px; }
    .cal-nav   { display:flex; gap:5px; }
    .cal-nb    { padding:5px 13px; background:var(--s2); border:1px solid var(--border); border-radius:var(--r-sm); font-size:12px; font-weight:500; font-family:var(--font); color:var(--t2); cursor:pointer; transition:all 140ms; }
    .cal-nb:hover { background:var(--indigo-bg); border-color:var(--indigo-ri); color:var(--indigo); }
    .cal-nb.td    { background:var(--indigo-bg); border-color:var(--indigo-ri); color:var(--indigo); font-weight:600; }
    .cal-nb.td:hover { background:var(--indigo); color:#fff; border-color:var(--indigo-dk); }
    .cal-head-row { display:grid; grid-template-columns:repeat(7,1fr); background:var(--s2); border-bottom:1px solid var(--border); }
    .cal-dn   { text-align:center; padding:9px 4px; font-size:10.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--t4); }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); }
    .cal-cell { min-height:84px; padding:7px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); }
    .cal-cell:nth-child(7n) { border-right:none; }
    .cal-cell.omo { background:var(--s2); }
    .cal-cell.ist { background:#FFFDF0; }
    .cal-dnum { font-size:11.5px; font-weight:600; color:var(--t3); margin-bottom:5px; display:inline-flex; align-items:center; justify-content:center; width:21px; height:21px; border-radius:50%; }
    .cal-cell.omo .cal-dnum { color:var(--t4); opacity:.4; }
    .cal-cell.ist .cal-dnum { background:var(--indigo); color:#fff; }
    .cal-pill { font-size:10px; font-weight:600; padding:2px 6px; border-radius:4px; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; display:block; line-height:1.4; }
    .cp-red    { background:var(--red-bg);  color:var(--red); }
    .cp-yellow { background:var(--yel-bg);  color:var(--yel); }
    .cp-purple { background:var(--pur-bg);  color:var(--pur); }
    .cal-more  { font-size:9.5px; color:var(--t4); }

    /* MODAL */
    .overlay  { position:fixed; inset:0; background:rgba(0,0,0,.38); backdrop-filter:blur(4px); z-index:100; display:flex; align-items:center; justify-content:center; padding:16px; }
    .modal    { background:var(--surface); border-radius:var(--r-xl); box-shadow:var(--sh-lg); width:100%; max-width:480px; max-height:90vh; overflow-y:auto; }
    .modal.wide { max-width:520px; }
    .modal-hd { display:flex; align-items:center; justify-content:space-between; padding:18px 22px 16px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--surface); z-index:1; border-radius:var(--r-xl) var(--r-xl) 0 0; }
    .modal-hd h2 { font-size:15px; font-weight:700; color:var(--t1); margin:0; letter-spacing:-.2px; }
    .m-close  { width:30px; height:30px; border-radius:var(--r-sm); border:1px solid var(--border); background:var(--s2); cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--t3); transition:all 140ms; }
    .m-close:hover { background:var(--red-bg); border-color:var(--red-bd); color:var(--red); }
    .modal-bd { padding:20px 22px; }

    /* FORM */
    .fg  { margin-bottom:14px; }
    .fr  { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
    .fl  { display:block; font-size:11.5px; font-weight:600; color:var(--t2); margin-bottom:5px; letter-spacing:.02em; }
    .fi  { width:100%; padding:8px 11px; background:var(--s2); border:1px solid var(--border); border-radius:var(--r-sm); font-size:13px; font-family:var(--font); color:var(--t1); outline:none; transition:all 140ms; }
    .fi:focus { background:var(--surface); border-color:var(--indigo); box-shadow:0 0 0 3px rgba(79,70,229,.1); }
    .fi::placeholder { color:var(--t4); }
    textarea.fi { resize:none; line-height:1.5; }

    /* Amount row: currency dropdown + number input side by side */
    .amt-row  { display:flex; gap:6px; }
    .amt-cur  { width:96px; flex-shrink:0; }
    .amt-num  { flex:1; min-width:0; }

    .f-foot { display:flex; gap:9px; padding-top:16px; border-top:1px solid var(--border); margin-top:18px; }
    .btn-p  { flex:1; padding:10px; background:var(--indigo); border:1px solid var(--indigo-dk); border-radius:var(--r-sm); font-size:13.5px; font-weight:600; font-family:var(--font); color:#fff; cursor:pointer; transition:all 140ms; }
    .btn-p:hover { background:var(--indigo-dk); }
    .btn-s  { flex:1; padding:10px; background:var(--s2); border:1px solid var(--border); border-radius:var(--r-sm); font-size:13.5px; font-weight:600; font-family:var(--font); color:var(--t2); cursor:pointer; transition:all 140ms; }
    .btn-s:hover { background:var(--border); }

    /* SETTINGS */
    .set-section    { margin-bottom:22px; }
    .set-section h3 { font-size:11px; font-weight:700; color:var(--t3); letter-spacing:.07em; text-transform:uppercase; margin:0 0 10px; padding-bottom:8px; border-bottom:1px solid var(--border); }
    .set-section p  { font-size:12.5px; color:var(--t3); margin:0 0 10px; line-height:1.6; }
    .email-status   { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:20px; font-size:12px; font-weight:600; }
    .email-status.sent    { background:var(--grn-bg); color:var(--grn); border:1px solid var(--grn-bd); }
    .email-status.pending { background:var(--yel-bg); color:var(--yel); border:1px solid var(--yel-bd); }
    .send-btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; background:var(--s2); border:1px solid var(--border); border-radius:var(--r-sm); font-size:12.5px; font-weight:600; font-family:var(--font); color:var(--t2); cursor:pointer; transition:all 140ms; margin-top:10px; }
    .send-btn:hover { background:var(--indigo-bg); border-color:var(--indigo-ri); color:var(--indigo); }
    .preview-box { margin-top:12px; background:var(--s2); border:1px solid var(--border); border-radius:var(--r-sm); padding:12px; font-size:11.5px; color:var(--t2); font-family:var(--font-mono); white-space:pre-wrap; line-height:1.7; max-height:200px; overflow-y:auto; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useMemo } = React;

  /* ── helpers ── */
  const uid    = () => Math.random().toString(36).slice(2,9);
  const todDS  = () => new Date().toISOString().split('T')[0];
  const daysUntil = ds => {
    const t = new Date(); t.setHours(0,0,0,0);
    return Math.floor((new Date(ds+'T00:00:00') - t) / 86400000);
  };
  const fmtDate = ds => {
    if (!ds) return '';
    return new Date(ds+'T00:00:00').toLocaleDateString('en-GB',
      { weekday:'short', day:'numeric', month:'short', year:'numeric' });
  };

  /* ── status system ──
     overdue / today → RED
     soon (≤7d)      → YELLOW
     upcoming        → PURPLE
     done            → GREEN
     KPI cards match exactly:
       Due Today  → red,    This Month → yellow,
       90 Days    → purple, Completed  → green
  */
  const getStatus = ds => {
    const d = daysUntil(ds);
    if (d < 0)   return { key:'overdue',  label:'Overdue',    badge:'b-red',    card:'lc-red',    cal:'cp-red'    };
    if (d === 0)  return { key:'today',    label:'Today',      badge:'b-red',    card:'lc-red',    cal:'cp-red'    };
    if (d <= 7)   return { key:'soon',     label:`${d}d away`, badge:'b-yellow', card:'lc-yellow', cal:'cp-yellow' };
    return                { key:'upcoming', label:`${d}d away`, badge:'b-purple', card:'lc-purple', cal:'cp-purple' };
  };

  /* ── currencies ── */
  const CURRENCIES = [
    { code:'HKD', sym:'HK$', name:'Hong Kong Dollar' },
    { code:'USD', sym:'$',   name:'US Dollar'         },
    { code:'GBP', sym:'£',   name:'British Pound'     },
    { code:'EUR', sym:'€',   name:'Euro'              },
    { code:'THB', sym:'฿',   name:'Thai Baht'         },
    { code:'SGD', sym:'S$',  name:'Singapore Dollar'  },
    { code:'JPY', sym:'¥',   name:'Japanese Yen'      },
    { code:'AUD', sym:'A$',  name:'Australian Dollar' },
    { code:'CNY', sym:'¥',   name:'Chinese Yuan'      },
  ];
  const getCur = code => CURRENCIES.find(c => c.code === code) || CURRENCIES[0];

  const COUNTRIES     = ['Hong Kong','UK','Thailand','Singapore','Other'];
  const RTYPES        = ['One-off','Monthly','Annual'];
  const NOTIFY_EMAIL  = 'shilpafreemantle@gmail.com';
  const STORE_KEY     = 'lifeAdmin_v4';

  /* ── email builder ── */
  const buildEmailBody = items => {
    const now = new Date();
    const twoMoEnd = new Date(now.getFullYear(), now.getMonth() + 2, 0);
    const monthName = now.toLocaleDateString('en-GB', { month:'long', year:'numeric' });
    const relevant = items
      .filter(i => !i.completed)
      .filter(i => new Date(i.date+'T00:00:00') <= twoMoEnd)
      .sort((a,b) => daysUntil(a.date) - daysUntil(b.date));
    if (!relevant.length) return null;
    const lines = relevant.map(i => {
      const d = daysUntil(i.date);
      const urgency = d < 0 ? '🔴 OVERDUE' : d === 0 ? '🔴 TODAY' : d <= 7 ? '🟡 SOON' : '🟣 UPCOMING';
      const cur = getCur(i.currency);
      const amt = i.amount ? ` — ${cur.sym}${parseFloat(i.amount).toLocaleString()}` : '';
      return `${urgency}  ${i.item_name} (${i.category}) — Due ${fmtDate(i.date)}${amt}`;
    });
    return {
      to: NOTIFY_EMAIL,
      subject: `Life Admin — Monthly Summary for ${monthName}`,
      body: [`Hi Shilpa,`,``,`Here is your Life Admin summary for ${monthName}.`,
             `The following items require attention (most urgent first):`,``,...lines,``,`Stay on top of it! 🎯`,`— Life Admin`].join('\n'),

  const sendEmail = async payload => {
    try {
      const r = await fetch('/api/send-email', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });

    window.open(`mailto:${payload.to}?subject=${encodeURIComponent(payload.subject)}&body=${encodeURIComponent(payload.body)}`,'_blank');

  };

  const autoMonthlyEmail = async items => {
    const now = new Date();
    const key = `sent_${now.getFullYear()}_${now.getMonth()}`;
    if (localStorage.getItem(key)) return;
    const payload = buildEmailBody(items);
    if (!payload) return;
    localStorage.setItem(key, new Date().toISOString());
    await sendEmail(payload);

  /* ── icons ── */

    trash: <svg width="13" height="13" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0 1 16.138 21H7.862a2 2 0 0 1-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v3M4 7h16"/></svg>,

    cal:   <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2z"/></svg>,
    grid:  <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
    cog:   <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 0 0-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 0 0-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 0 0-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 0 0-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 0 0 1.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>,
    mail:  <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 0 0 2.22 0L21 8M5 19h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2z"/></svg>,
  };

  /* ── Modal ── */
  const Modal = ({ open, onClose, title, wide, children }) => {
    useEffect(() => {
      const h = e => e.key === 'Escape' && onClose();

      return () => window.removeEventListener('keydown', h);

      <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>

  /* ── Settings Panel ── */
  const SettingsPanel = ({ items, onClose }) => {
    const [sending,     setSending]     = useState(false);
    const [previewText, setPreviewText] = useState('');

    const handleSend = async () => {

      setPreviewText(payload.body);
      await sendEmail(payload);
      const n = new Date();
      const key = `sent_${n.getFullYear()}_${n.getMonth()}`;

    return (

        {/* Colour guide */}

              <div key={r.label} style={{display:'flex',alignItems:'center',gap:'10px'}}>

                <div>
                  <span style={{fontSize:'12.5px',fontWeight:'600',color:'var(--t1)'}}>{r.label}</span>
                  <span style={{fontSize:'11.5px',color:'var(--t4)',marginLeft:'6px'}}>{r.desc}</span>

        <div className="f-foot" style={{marginTop:0}}>
          <button className="btn-p" onClick={onClose}>Close</button>
        </div>
      </div>
    );
  };

  /* ── Item Form ──
     Currency is a dropdown inside the form, per item.
     Amount field has no overlapping symbol — the dropdown sits beside it.
  */
  const ItemForm = ({ item, onSave, onCancel }) => {
    const blank = {
      item_name:'', category:'', country:'Hong Kong', supplier:'',
      date:'', renewal_type:'One-off', currency:'HKD', amount:'', notes:''
    };
    const [f, setF] = useState(item ? { currency:'HKD', ...item } : blank);
    const u = k => e => setF(p => ({ ...p, [k]: e.target.value }));

    const submit = e => {
      e.preventDefault();
      if (!f.item_name.trim() || !f.date || !f.category.trim()) {
        alert('Name, Category and Date are required.');
        return;
      }
      onSave(f);
    };

    return (
      <form onSubmit={submit}>
        <div className="fg">
          <label className="fl">Item Name *</label>
          <input className="fi" type="text" value={f.item_name} onChange={u('item_name')}
            placeholder="e.g. Car Insurance Renewal" autoFocus />
        </div>
        <div className="fr">
          <div>
            <label className="fl">Category *</label>
            <input className="fi" type="text" value={f.category} onChange={u('category')}
              placeholder="e.g. Insurance" />
          </div>
          <div>
            <label className="fl">Date *</label>
            <input className="fi" type="date" value={f.date} onChange={u('date')} />
          </div>
        </div>
        <div className="fr">
          <div>
            <label className="fl">Country</label>
            <select className="fi" value={f.country} onChange={u('country')}>

          </div>

            <label className="fl">Type</label>

        </div>
        <div className="fr">
          <div>
            <label className="fl">Supplier</label>
            <input className="fi" type="text" value={f.supplier} onChange={u('supplier')}
              placeholder="Optional" />
          </div>
          <div>
            <label className="fl">Amount</label>
            {/* Currency dropdown + number input — side by side, no overlap */}
            <div className="amt-row">
              <select className="fi amt-cur" value={f.currency} onChange={u('currency')}>
                {CURRENCIES.map(c => (
                  <option key={c.code} value={c.code}>{c.sym} {c.code}</option>
                ))}
              </select>
              <input className="fi amt-num" type="number" value={f.amount} onChange={u('amount')}
                placeholder="0.00" step="0.01" min="0" />

        <div className="fg">
          <label className="fl">Notes</label>

  /* ── Task Card ── */
  const TaskCard = ({ item, onEdit, onDelete, onToggle }) => {
    const st = item.completed
      ? { key:'done', label:'Done', badge:'b-green', card:'lc-done' }
      : getStatus(item.date);
    const cur = getCur(item.currency);
    return (
      <div className={`task-card ${st.card}`}>
        <button className={`chk-btn${item.completed?' checked':''}`}
          onClick={() => onToggle(item.id)}
          title={item.completed ? 'Reopen' : 'Mark complete'}>
          {item.completed && IC.chk}
        </button>
        <div className="task-body">
          <div className={`task-name${item.completed?' done':''}`}>{item.item_name}</div>
          <div className="meta-row">
            <span className={`badge ${st.badge}`}>{st.label}</span>
            {item.category && <span className="tag">{item.category}</span>}
            {item.country  && <span className="tag">{item.country}</span>}
            {item.amount   && <span className="amt-tag">{cur.sym}{parseFloat(item.amount).toLocaleString()}</span>}
            {item.renewal_type !== 'One-off' &&
              <span className="tag" style={{fontFamily:'var(--font-mono)',fontSize:'10.5px'}}>{item.renewal_type}</span>}
          </div>
          <div className="task-info">
            {IC.cal}
            <span>{fmtDate(item.date)}</span>
            {item.supplier && <><span>·</span><span>{item.supplier}</span></>}
            {item.notes    && <><span>·</span><em>{item.notes}</em></>}
          </div>
        </div>
        <div className="task-acts">
          <button className="ico-btn edit" onClick={() => onEdit(item)}      title="Edit">{IC.edit}</button>
          <button className="ico-btn del"  onClick={() => onDelete(item.id)} title="Delete">{IC.trash}</button>
        </div>
      </div>
    );
  };

  /* ── Calendar ── */
  const Calendar = ({ items }) => {
    const [cur, setCur] = useState(() => {
      const n = new Date(); return { y:n.getFullYear(), m:n.getMonth() };
    });
    const nav = d => setCur(p => {
      let m = p.m+d, y = p.y;
      if (m<0)  { m=11; y--; }
      if (m>11) { m=0;  y++; }
      return {y,m};
    });
    const goToday = () => { const n=new Date(); setCur({y:n.getFullYear(),m:n.getMonth()}); };
    const today = todDS();
    const title = new Date(cur.y,cur.m,1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});
    const pad   = n => String(n).padStart(2,'0');
    const fd = new Date(cur.y,cur.m,1).getDay();
    const dm = new Date(cur.y,cur.m+1,0).getDate();
    const dp = new Date(cur.y,cur.m,0).getDate();
    const cells = [];
    for (let i=fd-1; i>=0; i--) cells.push({day:dp-i,cur:false});
    for (let d=1; d<=dm; d++)   cells.push({day:d,cur:true});
    while (cells.length%7!==0)  cells.push({day:cells.length-dm-fd+1,cur:false});
    const dayItems = cell => {
      if (!cell.cur) return [];
      const ds = `${cur.y}-${pad(cur.m+1)}-${pad(cell.day)}`;
      return items.filter(i => i.date===ds && !i.completed);
    };
    return (
      <div className="cal-wrap">
        <div className="cal-hd">
          <span className="cal-title">{title}</span>
          <div className="cal-nav">
            <button className="cal-nb td" onClick={goToday}>Today</button>
            <button className="cal-nb" onClick={() => nav(-1)}>← Prev</button>
            <button className="cal-nb" onClick={() => nav(1)}>Next →</button>
          </div>
        </div>
        <div className="cal-head-row">
          {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(n =>
            <div key={n} className="cal-dn">{n}</div>
          )}
        </div>
        <div className="cal-grid">
          {cells.map((cell,idx) => {
            const ds   = cell.cur ? `${cur.y}-${pad(cur.m+1)}-${pad(cell.day)}` : null;
            const list = dayItems(cell);
            const isT  = ds === today;
            return (
              <div key={idx} className={`cal-cell${!cell.cur?' omo':''}${isT?' ist':''}`}>
                <span className="cal-dnum">{cell.day}</span>
                {list.slice(0,3).map(item => {
                  const st = getStatus(item.date);
                  return <span key={item.id} className={`cal-pill ${st.cal}`} title={item.item_name}>{item.item_name}</span>;
                })}
                {list.length > 3 && <span className="cal-more">+{list.length-3} more</span>}
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  /* ── date helpers ── */
  const isToday_    = ds => ds === todDS();
  const isThisWeek  = ds => { const d=daysUntil(ds); return d>0&&d<=6; };
  const isThisMonth = ds => {
    const dt=new Date(ds+'T00:00:00'), n=new Date();
    return dt.getMonth()===n.getMonth() && dt.getFullYear()===n.getFullYear();
  };

  /* ── sample data ── */
  const mkSamples = () => {
    const add = d => { const n=new Date(); n.setDate(n.getDate()+d); return n.toISOString().split('T')[0]; };
    return [
      {id:uid(),item_name:'Dentist Checkup',       category:'Personal',        country:'Hong Kong',supplier:'City Dental',date:add(0), renewal_type:'One-off',currency:'HKD',amount:'500', notes:'Annual checkup',   completed:false},
      {id:uid(),item_name:'Car Insurance Renewal',  category:'Insurance',        country:'Hong Kong',supplier:'AXA',       date:add(3), renewal_type:'Annual', currency:'HKD',amount:'2500',notes:'Full cover',       completed:false},
      {id:uid(),item_name:'Netflix Subscription',   category:'Subscriptions',   country:'Hong Kong',supplier:'Netflix',   date:add(5), renewal_type:'Monthly',currency:'HKD',amount:'118', notes:'',                 completed:false},
      {id:uid(),item_name:'Tax Return Filing',      category:'Tax & Compliance', country:'Hong Kong',supplier:'IRD',       date:add(10),renewal_type:'Annual', currency:'HKD',amount:'',    notes:'Income tax',       completed:false},
      {id:uid(),item_name:'Company Annual Filing',  category:'Corporate',        country:'Hong Kong',supplier:'Registry', date:add(15),renewal_type:'Annual', currency:'HKD',amount:'',    notes:'Annual accounts',  completed:false},
    ];
  };

  /* ── APP ── */
  function App() {
    const [items,    setItems]    = useState([]);
    const [loaded,   setLoaded]   = useState(false);
    const [modal,    setModal]    = useState(null); // null | 'add' | 'edit' | 'settings'
    const [editItem, setEditItem] = useState(null);
    const [view,     setView]     = useState('dashboard');
    const [kpiFlt,   setKpiFlt]   = useState('all');
    const [search,   setSearch]   = useState('');

    /* persistence */
    useEffect(() => {
      try {
        const raw = localStorage.getItem(STORE_KEY);
        setItems(raw ? (JSON.parse(raw).items || mkSamples()) : mkSamples());
      } catch { setItems(mkSamples()); }
      setLoaded(true);
    }, []);

    useEffect(() => {
      if (!loaded) return;
      localStorage.setItem(STORE_KEY, JSON.stringify({ items }));
    }, [items, loaded]);

    /* auto monthly email */
    useEffect(() => {
      if (loaded && items.length) autoMonthlyEmail(items);
    }, [loaded]);

    /* stats */
    const stats = useMemo(() => {
      const p = items.filter(i => !i.completed);
      const now = new Date(); now.setHours(0,0,0,0);
      const e90 = new Date(now.getTime()+90*86400000);
      return {
        todayCount: p.filter(i => isToday_(i.date) || daysUntil(i.date)<0).length,
        monthCount: p.filter(i => isThisMonth(i.date)).length,
        d90Count:   p.filter(i => { const d=new Date(i.date+'T00:00:00'); return d>=now&&d<=e90; }).length,
        doneCount:  items.filter(i => i.completed).length,
      };
    }, [items]);

    /* sorted lists */
    const pending   = useMemo(() => items.filter(i=>!i.completed).sort((a,b)=>a.date.localeCompare(b.date)), [items]);
    const completed = useMemo(() => items.filter(i=> i.completed).sort((a,b)=>b.date.localeCompare(a.date)), [items]);

    const filtered = useMemo(() => {
      let list = pending;
      if (kpiFlt==='today')  list = list.filter(i => isToday_(i.date) || daysUntil(i.date)<0);
      if (kpiFlt==='month')  list = list.filter(i => isThisMonth(i.date));
      if (kpiFlt==='90days') {
        const now=new Date(); now.setHours(0,0,0,0);
        const e=new Date(now.getTime()+90*86400000);
        list = list.filter(i => { const d=new Date(i.date+'T00:00:00'); return d>=now&&d<=e; });
      }
      if (search.trim()) {
        const q = search.toLowerCase();
        list = list.filter(i =>
          i.item_name.toLowerCase().includes(q) ||
          i.category.toLowerCase().includes(q)  ||
          (i.supplier||'').toLowerCase().includes(q)
        );
      }
      return list;
    }, [pending, kpiFlt, search]);

    const grouped = useMemo(() => {
      if (kpiFlt!=='all' || search.trim()) return null;
      return {
        overdueToday: pending.filter(i => isToday_(i.date) || daysUntil(i.date)<0),
        week:         pending.filter(i => isThisWeek(i.date)),
        month:        pending.filter(i => isThisMonth(i.date) && !isToday_(i.date) && !isThisWeek(i.date) && daysUntil(i.date)>=0),
        future:       pending.filter(i => { const d=daysUntil(i.date); return d>0 && !isThisMonth(i.date); }),
      };
    }, [pending, kpiFlt, search]);

    /* handlers */
    const closeModal = () => { setModal(null); setEditItem(null); };
    const openAdd    = () => { setEditItem(null); setModal('add'); };
    const openEdit   = it => { setEditItem(it);  setModal('edit'); };

    const handleSave = f => {
      setItems(prev => editItem
        ? prev.map(i => i.id===editItem.id ? {...i,...f} : i)
        : [...prev, {...f, id:uid(), completed:false}]
      );
      closeModal();
    };
    const handleDelete = id => { if (confirm('Delete this item?')) setItems(p => p.filter(i => i.id!==id)); };
    const handleToggle = id => setItems(p => p.map(i => i.id===id ? {...i,completed:!i.completed} : i));
    const setKpi = k => { setKpiFlt(p => p===k?'all':k); setView('dashboard'); };

    const Section = ({ label, list }) => {
      if (!list || !list.length) return null;
      return (
        <div className="sec-block">
          <div className="sec-hd">{label} <em>{list.length}</em></div>
          <div className="item-list">
            {list.map(it => <TaskCard key={it.id} item={it} onEdit={openEdit} onDelete={handleDelete} onToggle={handleToggle}/>)}
          </div>
        </div>
      );
    };

    const isFiltered  = kpiFlt!=='all' || search.trim()!=='';
    const filterLabel = kpiFlt==='today'?'Due Today & Overdue':kpiFlt==='month'?'This Month':kpiFlt==='90days'?'Next 90 Days':'Search Results';

    if (!loaded) return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--t4)',fontSize:'13px'}}>
        Loading…
      </div>
    );

    return (
      <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>

        {/* SIDEBAR */}
        <aside className="sidebar">
          <div className="sb-logo">
            <h1>Life Admin</h1>
            <p>Personal Admin Management</p>
          </div>
          <nav className="sb-nav">
            <button className={`nav-it${view==='dashboard'?' active':''}`} onClick={() => setView('dashboard')}>{IC.grid} Dashboard</button>
            <button className={`nav-it${view==='calendar'?' active':''}`}  onClick={() => setView('calendar')} >{IC.cal}  Calendar</button>
          </nav>
          <div className="sb-footer">
            <button className="nav-it" onClick={() => setModal('settings')}>{IC.cog} Settings</button>
          </div>
        </aside>

        {/* MAIN */}
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>

          {/* HEADER */}
          <div className="page-hd">
            <div className="hd-top">
              <div>
                <h2 className="hd-title">{view==='calendar'?'Calendar':'Dashboard'}</h2>
                <p className="hd-sub">Keep your personal admin under control</p>
              </div>
              <button className="add-btn" onClick={openAdd}>{IC.plus} New Item</button>
            </div>

            {/* KPI CARDS — colours mirror the status badges they filter */}
            <div className="kpi-row">
              <div className={`kpi-card kpi-red${kpiFlt==='today'?' active':''}`}
                onClick={() => setKpi('today')} title="Due Today & Overdue">
                <div className="kpi-lbl">Due Today</div>
                <div className="kpi-num">{stats.todayCount}</div>
                <div className="kpi-desc">today + overdue</div>
              </div>
              <div className={`kpi-card kpi-yellow${kpiFlt==='month'?' active':''}`}
                onClick={() => setKpi('month')} title="This Calendar Month">
                <div className="kpi-lbl">This Month</div>
                <div className="kpi-num">{stats.monthCount}</div>
                <div className="kpi-desc">this calendar month</div>
              </div>
              <div className={`kpi-card kpi-purple${kpiFlt==='90days'?' active':''}`}
                onClick={() => setKpi('90days')} title="Next 90 Days">
                <div className="kpi-lbl">90 Days</div>
                <div className="kpi-num">{stats.d90Count}</div>
                <div className="kpi-desc">within 90 days</div>
              </div>
              <div className={`kpi-card kpi-green${kpiFlt==='completed'?' active':''}`}
                onClick={() => setKpi('completed')} title="Completed Items">
                <div className="kpi-lbl">Completed</div>
                <div className="kpi-num">{stats.doneCount}</div>
                <div className="kpi-desc">all time</div>
              </div>
            </div>
          </div>

          {/* TOOLBAR */}
          <div className="toolbar">
            <div className="search-w">
              {IC.srch}
              <input className="search-in" type="text"
                placeholder="Search tasks, categories, suppliers…"
                value={search} onChange={e => setSearch(e.target.value)} />
            </div>
            {search && <button className="tb-btn" onClick={() => setSearch('')}>{IC.x} Clear</button>}
            {kpiFlt!=='all' && (
              <button className="tb-btn active" onClick={() => setKpiFlt('all')}>
                {IC.x} {kpiFlt==='today'?'Today':kpiFlt==='month'?'Month':kpiFlt==='90days'?'90 Days':'Completed'}
              </button>
            )}
            <button className="tb-btn" onClick={() => setModal('settings')}>{IC.cog} Settings</button>
          </div>

          {/* SCROLL AREA */}
          <div className="main-scroll">

            {/* CALENDAR VIEW */}
            {view==='calendar' && (
              <div className="content"><Calendar items={items}/></div>
            )}

            {/* DASHBOARD VIEW */}
            {view==='dashboard' && (
              <div className="content">

                {/* Legend (shown in default all-items view) */}
                {kpiFlt==='all' && !search && (
                  <div className="legend">
                    <div className="lg-item"><span className="lg-dot" style={{background:'var(--red)'}}/>Overdue / Today</div>
                    <div className="lg-item"><span className="lg-dot" style={{background:'var(--yel)'}}/>Due Soon (≤7 days)</div>
                    <div className="lg-item"><span className="lg-dot" style={{background:'var(--pur)'}}/>Upcoming</div>
                    <div className="lg-item"><span className="lg-dot" style={{background:'var(--grn)'}}/>Completed</div>
                  </div>
                )}

                {/* COMPLETED view */}
                {kpiFlt==='completed' && (
                  completed.length===0
                    ? <div className="empty"><p>No completed items yet.</p></div>
                    : <>
                        <div className="sec-hd">Completed <em>{completed.length}</em></div>
                        <div className="item-list">
                          {completed.map(it => <TaskCard key={it.id} item={it} onEdit={openEdit} onDelete={handleDelete} onToggle={handleToggle}/>)}
                        </div>
                      </>
                )}

                {/* FILTERED / SEARCH view */}
                {kpiFlt!=='completed' && isFiltered && (
                  filtered.length===0
                    ? <div className="empty"><p>No items match this filter.</p><p>Try adjusting your search or timeframe.</p></div>
                    : <>
                        <div className="sec-hd">{filterLabel} <em>{filtered.length}</em></div>
                        <div className="item-list">
                          {filtered.map(it => <TaskCard key={it.id} item={it} onEdit={openEdit} onDelete={handleDelete} onToggle={handleToggle}/>)}
                        </div>
                      </>
                )}

                {/* ALL GROUPED view */}
                {kpiFlt!=='completed' && !isFiltered && grouped && (() => {
                  const {overdueToday,week,month,future} = grouped;
                  const empty = !overdueToday.length && !week.length && !month.length && !future.length;
                  return empty
                    ? <div className="empty"><p>Nothing pending — you're all clear! 🎉</p><p>Add a new item to get started.</p></div>
                    : <>
                        <Section label="Due Today & Overdue" list={overdueToday}/>
                        <Section label="Due This Week"       list={week}/>
                        <Section label="Due This Month"      list={month}/>
                        <Section label="Within 90 Days"      list={future}/>
                      </>;
                })()}

              </div>
            )}
          </div>
        </div>

        {/* MODALS */}
        <Modal open={modal==='add'}      onClose={closeModal} title="New Task">
          <ItemForm item={null}     onSave={handleSave} onCancel={closeModal}/>
        </Modal>
        <Modal open={modal==='edit'}     onClose={closeModal} title="Edit Task">
          <ItemForm item={editItem} onSave={handleSave} onCancel={closeModal}/>
        </Modal>
        <Modal open={modal==='settings'} onClose={closeModal} title="Settings" wide>
          <SettingsPanel items={items} onClose={closeModal}/>
        </Modal>

      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
